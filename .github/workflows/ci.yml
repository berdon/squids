name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test (excluding shell automation packages)
        run: go test $(go list ./... | grep -v '/tests/shell-automation/')

      - name: Coverage gate (>= 90%)
        run: ./scripts/coverage-gate.sh 90.0

      - name: Build sq
        run: make build

      - name: Build APE/fallback artifact
        run: ./scripts/build-ape.sh

      - name: Run sq parity suite
        run: TARGET_BIN=./bin/sq ./scripts/parity/run-parity.sh

      - name: Run getting-started guide smoke
        run: ./scripts/parity/getting-started-smoke.sh

      - name: Run concurrency smoke
        run: ./scripts/parity/concurrency-smoke.sh

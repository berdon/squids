name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test
        run: go test ./...

      - name: Coverage gate (>= 90%)
        run: |
          go test ./... -coverpkg=./... -coverprofile=coverage.out
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          echo "Total coverage: ${total}%"
          awk -v c="$total" 'BEGIN { if (c+0 < 90.0) { printf("Coverage gate failed: %.1f%% < 90.0%%\n", c); exit 1 } }'

      - name: Build sq
        run: make build

      - name: Build APE/fallback artifact
        run: ./scripts/build-ape.sh

      - name: Run sq parity suite
        run: TARGET_BIN=./bin/sq ./scripts/parity/run-parity.sh

      - name: Run getting-started guide smoke
        run: ./scripts/parity/getting-started-smoke.sh

      - name: Run concurrency smoke
        run: ./scripts/parity/concurrency-smoke.sh
